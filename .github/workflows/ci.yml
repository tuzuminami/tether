name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tether
          POSTGRES_USER: tether
          POSTGRES_PASSWORD: tether_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tether -d tether"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TETHER_TEST_DATABASE_URL: postgres://tether:tether_ci_password@127.0.0.1:5432/tether
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run test:postgres-integration
      - run: npm run check:licenses
