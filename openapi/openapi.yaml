openapi: 3.1.0
info:
  title: TETHER API
  version: 0.1.0
  summary: Explainable relationship state engine API.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      responses:
        "200":
          description: Health status.
  /v1/models:
    post:
      summary: Create a relationship model version.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "201":
          description: Model created.
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /v1/relationships:
    post:
      summary: Create a relationship snapshot pinned to a model version.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "201":
          description: Relationship created.
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /v1/relationships/{relationshipId}/events:
    post:
      summary: Apply a declared event idempotently.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: relationshipId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event applied or replayed.
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /v1/relationships/{relationshipId}/explanation:
    get:
      summary: Return the latest transition explanation.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - name: relationshipId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Latest explanation.
        "404":
          $ref: "#/components/responses/Error"
  /v1/relationships/{relationshipId}/decay-preview:
    post:
      summary: Preview deterministic time-based decay.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - name: relationshipId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Decay preview.
        "422":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    TenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Stable error envelope.
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error:
                type: object
                required: [code, message, details, correlationId]
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: string
                  correlationId:
                    type: string
