openapi: 3.1.0
info:
  title: TETHER API
  version: 2.0.0
  summary: Explainable relationship state engine API.
  description: >
    TETHER exposes explicit, bounded relationship state transitions. The packaged
    PostgreSQL runtime requires a verified external authentication adapter and
    fails closed when tenant context or migration readiness is ambiguous.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Public liveness probe.
      responses:
        "200":
          description: Health status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /ready:
    get:
      summary: Public readiness probe for configured runtime dependencies.
      responses:
        "200":
          description: Runtime dependencies are ready to serve requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "503":
          $ref: "#/components/responses/Error"
  /v1/models:
    post:
      summary: Create an immutable relationship model version.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelationshipModel"
      responses:
        "201":
          description: Model created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /v1/relationships:
    post:
      summary: Create a relationship snapshot pinned to a model version.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRelationshipRequest"
      responses:
        "201":
          description: Relationship created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /v1/relationships/{relationshipId}/events:
    post:
      summary: Apply a declared event idempotently.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/RelationshipId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelationshipEventRequest"
      responses:
        "200":
          description: Event applied or replayed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /v1/relationships/{relationshipId}/explanation:
    get:
      summary: Return the latest transition explanation.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RelationshipId"
      responses:
        "200":
          description: Latest explanation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/relationships/{relationshipId}/simulate:
    post:
      summary: Simulate a declared event without mutating relationship state.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RelationshipId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateRelationshipEventRequest"
      responses:
        "200":
          description: Deterministic simulated transition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /v1/relationships/{relationshipId}/decay-preview:
    post:
      summary: Preview deterministic time-based decay.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RelationshipId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecayPreviewRequest"
      responses:
        "200":
          description: Decay preview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Credentials are verified by the configured authentication adapter.
  parameters:
    TenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    RelationshipId:
      name: relationshipId
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Stable error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    RelationshipModel:
      type: object
      additionalProperties: false
      required: [id, version, axes, events, transitionRules, boundaryRules]
      properties:
        id:
          type: string
        version:
          type: string
        axes:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/RelationshipAxis"
        events:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/RelationshipEventDeclaration"
        transitionRules:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/TransitionRule"
        boundaryRules:
          type: array
          items:
            $ref: "#/components/schemas/BoundaryRule"
        decayRules:
          type: array
          items:
            $ref: "#/components/schemas/DecayRule"
    RelationshipAxis:
      type: object
      additionalProperties: false
      required: [id, min, max, initial]
      properties:
        id:
          type: string
        min:
          type: number
        max:
          type: number
        initial:
          type: number
    RelationshipEventDeclaration:
      type: object
      additionalProperties: false
      required: [type]
      properties:
        type:
          type: string
    TransitionRule:
      type: object
      additionalProperties: false
      required: [id, eventType, axis, delta, reasonCode]
      properties:
        id:
          type: string
        eventType:
          type: string
        axis:
          type: string
        delta:
          type: number
        reasonCode:
          type: string
    BoundaryRule:
      type: object
      additionalProperties: false
      required: [id, eventType, axis, policyRef]
      properties:
        id:
          type: string
        eventType:
          type: string
        axis:
          type: string
        blocksPositiveDelta:
          type: boolean
        policyRef:
          type: string
    DecayRule:
      type: object
      additionalProperties: false
      required: [axis, perDay]
      properties:
        axis:
          type: string
        perDay:
          type: number
          minimum: 0
    CreateRelationshipRequest:
      type: object
      additionalProperties: false
      required: [modelId, modelVersion, subjectRef]
      properties:
        id:
          type: string
        modelId:
          type: string
        modelVersion:
          type: string
        subjectRef:
          type: string
    RelationshipEventRequest:
      type: object
      additionalProperties: false
      required: [type]
      properties:
        id:
          type: string
        type:
          type: string
        payload:
          type: object
          additionalProperties: true
    SimulateRelationshipEventRequest:
      type: object
      additionalProperties: false
      required: [event]
      properties:
        event:
          $ref: "#/components/schemas/RelationshipEventRequest"
        baselineAt:
          type: string
    DecayPreviewRequest:
      type: object
      additionalProperties: false
      required: [baselineAt]
      properties:
        baselineAt:
          type: string
    ResponseEnvelope:
      type: object
      required: [data, meta]
      properties:
        data: true
        meta:
          type: object
          required: [requestId, correlationId, apiVersion]
          properties:
            requestId:
              type: string
            correlationId:
              type: string
            apiVersion:
              type: string
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details, correlationId]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: string
            correlationId:
              type: string
